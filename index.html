<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarPass | Histórico Digital do Seu Veículo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* ===== RESET E VARIÁVEIS ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --bg-dark: #050505;
      --bg-card: #0b0b0b;
      --bg-surface: #181818;
      --bg-surface-elevated: #222;
      --border-subtle: rgba(255,255,255,0.07);
      --border-medium: rgba(255,255,255,0.15);
      --text-primary: #fff;
      --text-secondary: #8e8e93;
      --text-muted: #55555e;
      --accent-electric: #0066ff;
      --accent-cyan: #00d2ff;
      --accent-emerald: #10b981;
      --glass-bg: rgba(15,15,15,0.7);
      --glass-border: rgba(255,255,255,0.08);
      --shadow-premium: 0 30px 60px rgba(0,0,0,0.9);
      --transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow-x: hidden;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--bg-surface-elevated); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-electric); }

    /* ===== UTILITÁRIOS & CARDS ===== */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
    }
    .glow-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      overflow: hidden;
      transition: var(--transition);
    }
    .glow-card:hover {
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-electric), #0044b3);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 20px rgba(0,102,255,0.35);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 30px rgba(0,102,255,0.6);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      border: 1px solid var(--border-medium);
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-blue { background: rgba(0,102,255,0.15); color: var(--accent-cyan); border: 1px solid rgba(0,102,255,0.3); }
    .badge-green { background: rgba(16,185,129,0.15); color: var(--accent-emerald); border: 1px solid rgba(16,185,129,0.3); }

    /* ===== SISTEMA DE NAVEGAÇÃO DE VIEWS ===== */
    .view-section { display: none; animation: fadeIn 0.4s ease forwards; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    .logo {
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.04em;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .logo-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-electric);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-electric);
    }

    /* ===== LINHA DO TEMPO (TIMELINE) ===== */
    .timeline {
      position: relative;
      padding-left: 32px;
      margin-top: 24px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border-subtle);
    }
    .timeline-node {
      position: relative;
      margin-bottom: 32px;
    }
    .timeline-node::before {
      content: '';
      position: absolute;
      left: -27px;
      top: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent-electric);
      box-shadow: 0 0 12px var(--accent-electric);
      border: 2px solid var(--bg-dark);
    }
    .timeline-card {
      padding: 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
    }

    /* ===== MODAIS ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
      padding: 32px;
      position: relative;
      animation: modalUp 0.3s ease;
    }
    @keyframes modalUp {
      from { transform: translateY(30px) scale(0.95); opacity:0; }
      to { transform: translateY(0) scale(1); opacity:1; }
    }

    /* ===== FORMULÁRIOS & INPUTS ===== */
    input[type="text"], input[type="email"], input[type="password"], textarea, select {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      padding: 12px 16px;
      border-radius: 8px;
      color: #fff;
      outline: none;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    input:focus, textarea:focus {
      border-color: var(--accent-electric);
    }
    label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 4px;
    }

    /* ===== NOTIFICAÇÃO TOAST ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--bg-surface-elevated);
      border: 1px solid var(--accent-electric);
      color: #fff;
      padding: 14px 24px;
      border-radius: 12px;
      box-shadow: var(--shadow-premium);
      z-index: 3000;
      transform: translateY(100px);
      opacity: 0;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ===== CONTÊINER DE QR CODE ===== */
    .qr-display {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      display: inline-block;
      min-width: 200px;
      min-height: 200px;
    }
    .qr-display img, .qr-display canvas {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div id="toast" class="toast">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d2ff" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span id="toast-message">Notificação</span>
  </div>

  <div id="maintenanceFormModal" class="modal-overlay">
    <div class="modal-content">
      <h3 style="font-size:1.4rem; margin-bottom:16px;">Adicionar Manutenção</h3>
      <form id="maintenanceForm">
        <input type="hidden" id="maintenanceVehicleId" value="" />
        
        <label>Data</label>
        <input type="text" id="mDate" placeholder="Ex: 12 Out, 2026" required />
        
        <label>Descrição *</label>
        <input type="text" id="mDesc" placeholder="Ex: Troca de óleo e filtros" required />
        
        <label>Valor (opcional)</label>
        <input type="text" id="mValue" placeholder="Ex: R$ 1.200" />
        
        <label>Oficina / Local</label>
        <input type="text" id="mPlace" placeholder="Ex: Concessionária Stuttgart" />
        
        <div style="display:flex; gap:12px; margin-top:20px; justify-content:flex-end;">
          <button type="button" id="cancelMaintenanceBtn" class="btn-secondary">Cancelar</button>
          <button type="submit" class="btn-primary">Adicionar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="view-generator" class="view-section active">
    <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; background:radial-gradient(circle at 50% 30%, rgba(0,102,255,0.18) 0%, transparent 65%);">
      <div class="logo" style="margin-bottom:32px;"><div class="logo-dot"></div> CARPASS</div>
      <div class="glass-panel" style="max-width:500px; width:100%; padding:40px; text-align:center;">
        <h1 style="font-size:2.2rem; font-weight:800; margin-bottom:12px;">Gerar QR Code</h1>
        <p style="color:var(--text-secondary); margin-bottom:32px;">Crie um QR Code único para vincular ao seu veículo.</p>
        <button id="generateQrBtn" class="btn-primary" style="width:100%; justify-content:center; font-size:1.1rem; padding:16px;">
          📱 Gerar Novo QR Code
        </button>
        <div id="qrGeneratedContainer" style="margin-top:32px; display:none;">
          <div class="qr-display" id="qrDisplayBox"></div>
          <p style="color:var(--text-secondary); font-size:0.85rem; margin-top:12px;">Escaneie o código acima com o celular ou copie o link.</p>
          <button id="copyGeneratedLinkBtn" class="btn-secondary" style="margin-top:16px; width:100%; justify-content:center;">Copiar Link do QR Code</button>
        </div>
      </div>
    </div>
  </div>

  <div id="view-public" class="view-section">
    <div style="max-width:1000px; margin:0 auto; padding:40px 20px 80px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
        <div class="logo"><div class="logo-dot"></div> CARPASS <span style="font-size:0.75rem; color:var(--text-muted); font-weight:400; margin-left:8px;">| HISTÓRICO DIGITAL</span></div>
        <button id="backToGeneratorBtn" class="btn-secondary">Voltar ao Gerador</button>
      </div>
      <div id="publicContent">
        </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ----- CONFIGURAÇÃO DO SUPABASE -----
      const SUPABASE_URL = 'https://mdyzyfimlkmxyishmaao.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_XeZ2g0WeeP09BVbm6C4n7w_McAyCiCF';

      let supabase;
      if (window._supabaseClient) {
        supabase = window._supabaseClient;
      } else {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        window._supabaseClient = supabase;
      }

      // ----- REFERÊNCIAS DO DOM -----
      const $ = id => document.getElementById(id);
      const generatorView = $('view-generator');
      const publicView = $('view-public');
      const publicContent = $('publicContent');
      const backToGeneratorBtn = $('backToGeneratorBtn');
      const toast = $('toast');
      const toastMsg = $('toast-message');

      // ----- EXIBIR NOTIFICAÇÕES (TOAST) -----
      function triggerToast(msg, isError = false) {
        toastMsg.innerText = msg;
        toast.style.borderColor = isError ? '#ff4444' : 'var(--accent-electric)';
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => {
          toast.classList.remove('show');
        }, 4000);
      }

      // ----- GERAR UUID -----
      function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      }

      // ----- GERAR E EXIBIR QR CODE -----
      function generateAndShowQR() {
        const uuid = generateUUID();
        const targetUrl = window.location.origin + window.location.pathname + '?id=' + uuid;

        const container = $('qrGeneratedContainer');
        const qrDisplay = $('qrDisplayBox');
        qrDisplay.innerHTML = ''; 

        if (window.QRCode) {
          new QRCode(qrDisplay, {
            text: targetUrl,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
          });
        } else {
          qrDisplay.innerText = "Erro ao carregar gerador. Tente novamente.";
        }

        qrDisplay.dataset.url = targetUrl;
        container.style.display = 'block';
        triggerToast('QR Code criado! Escaneie ou acesse o link.');
      }

      // ----- COPIAR LINK -----
      function copyGeneratedLink() {
        const qrDisplay = $('qrDisplayBox');
        const url = qrDisplay?.dataset.url || window.location.href;
        navigator.clipboard?.writeText(url).then(() => {
          triggerToast('Link copiado para a área de transferência!');
        }).catch(() => {
          prompt('Copie o link abaixo:', url);
        });
      }

      // ----- CONSULTAR SUPABASE POR UUID -----
      async function loadVehicleByUuid(uuid) {
        try {
          const { data, error } = await supabase
            .from('vehicles')
            .select('*, maintenances(*)')
            .eq('uuid', uuid)
            .maybeSingle();

          if (error) {
            console.error('Erro na busca:', error);
            return null;
          }
          return data;
        } catch (err) {
          console.error('Exceção:', err);
          return null;
        }
      }

      // ----- RENDERIZAR TELA DE CONTEÚDO -----
      async function renderPublic() {
        const params = new URLSearchParams(window.location.search);
        const uuid = params.get('id');

        if (!uuid) {
          document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
          generatorView.classList.add('active');
          return;
        }

        publicContent.innerHTML = '<div style="text-align:center; padding:60px; color:var(--text-secondary);">Consultando informações no banco de dados...</div>';
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        publicView.classList.add('active');

        const vehicleData = await loadVehicleByUuid(uuid);

        // CASO A: QR CODE NÃO CADASTRADO -> FORMULÁRIO DE CADASTRO
        if (!vehicleData) {
          publicContent.innerHTML = `
            <div class="glass-panel" style="max-width:520px; margin:0 auto; padding:40px;">
              <h2 style="font-size:1.6rem; font-weight:700; text-align:center; margin-bottom:8px;">Ativar QR Code</h2>
              <p style="color:var(--text-secondary); text-align:center; margin-bottom:24px; font-size:0.9rem;">
                Este QR Code é novo! Preencha as informações para cadastrar seu veículo.
              </p>
              <form id="publicVehicleForm">
                <label>E-mail do Proprietário *</label>
                <input type="email" id="publicAuthEmail" placeholder="seu@email.com" required />
                
                <label>Senha de Acesso *</label>
                <input type="password" id="publicAuthPassword" placeholder="••••••••" required />
                
                <hr style="border-color:var(--border-subtle); margin:20px 0;" />
                
                <label>Nome / Modelo do Veículo *</label>
                <input type="text" id="publicVName" placeholder="Ex: Porsche 911 GT3" required />
                
                <label>Marca *</label>
                <input type="text" id="publicVBrand" placeholder="Ex: Porsche" required />
                
                <label>Ano</label>
                <input type="text" id="publicVYear" placeholder="Ex: 2024" />
                
                <label>Quilometragem</label>
                <input type="text" id="publicVKm" placeholder="Ex: 12.450 km" />
                
                <label>Potência (CV)</label>
                <input type="text" id="publicVPower" placeholder="Ex: 525 CV" />
                
                <label>Motor</label>
                <input type="text" id="publicVEngine" placeholder="Ex: 4.0 Boxer" />
                
                <label>Câmbio</label>
                <input type="text" id="publicVTransmission" placeholder="Ex: PDK 7 marchas" />
                
                <label>URL da Imagem (opcional)</label>
                <input type="text" id="publicVImage" placeholder="https://exemplo.com/foto.jpg" />
                
                <button type="submit" id="publicSubmitBtn" class="btn-primary" style="width:100%; margin-top:20px; justify-content:center;">
                  Cadastrar e Vincular QR Code
                </button>
              </form>
            </div>
          `;

          const form = $('publicVehicleForm');
          const submitBtn = $('publicSubmitBtn');

          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Gravando dados...';

            const email = $('publicAuthEmail').value.trim();
            const password = $('publicAuthPassword').value.trim();

            try {
              let userId = null;

              // Tentar Login
              const { data: signInData } = await supabase.auth.signInWithPassword({ email, password });
              if (signInData && signInData.user) {
                userId = signInData.user.id;
              } else {
                // Tentar Cadastro se não existir
                const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
                if (signUpError) throw new Error(signUpError.message);
                userId = signUpData.user?.id;
              }

              if (!userId) throw new Error('Falha na autenticação do usuário.');

              // Salvar Veículo
              const { error: insertError } = await supabase
                .from('vehicles')
                .insert([{
                  uuid: uuid,
                  user_id: userId,
                  name: $('publicVName').value.trim(),
                  brand: $('publicVBrand').value.trim(),
                  year: $('publicVYear').value.trim(),
                  km: $('publicVKm').value.trim(),
                  power: $('publicVPower').value.trim(),
                  engine: $('publicVEngine').value.trim(),
                  transmission: $('publicVTransmission').value.trim(),
                  image: $('publicVImage').value.trim()
                }]);

              if (insertError) throw new Error(insertError.message);

              triggerToast('Veículo registrado com sucesso!');
              setTimeout(() => { window.location.reload(); }, 1200);

            } catch (err) {
              triggerToast('Erro: ' + err.message, true);
              submitBtn.disabled = false;
              submitBtn.textContent = 'Cadastrar e Vincular QR Code';
            }
          });

          backToGeneratorBtn.onclick = () => {
            window.location.href = window.location.origin + window.location.pathname;
          };
          return;
        }

        // CASO B: VEÍCULO JÁ CADASTRADO -> EXIBIR HISTÓRICO
        const v = vehicleData;
        const maintList = (v.maintenances || []).map(m => `
          <div class="timeline-node">
            <div class="timeline-card">
              <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                  <span style="color:var(--text-muted); font-size:0.8rem;">${m.date} ${m.place ? '• ' + m.place : ''}</span>
                  <h4 style="font-size:1.1rem; font-weight:600; margin-top:4px;">${m.description}</h4>
                </div>
                ${m.value ? `<span class="badge badge-blue">${m.value}</span>` : ''}
              </div>
            </div>
          </div>
        `).join('') || '<p style="color:var(--text-muted);">Nenhuma manutenção cadastrada ainda.</p>';

        publicContent.innerHTML = `
          <div class="glow-card" style="margin-bottom:32px; padding:0; overflow:hidden;">
            <div style="height:350px; width:100%; background-size:cover; background-position:center; background-image:url('${v.image || 'https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?auto=format&fit=crop&w=1600&q=80'}'); position:relative;">
              <div style="position:absolute; inset:0; background:linear-gradient(180deg, rgba(5,5,5,0.1) 0%, var(--bg-card) 100%);"></div>
              <div style="position:absolute; bottom:28px; left:28px; right:28px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px;">
                <div>
                  <div class="badge badge-green" style="margin-bottom:10px;">✓ VEÍCULO REGISTRADO E VERIFICADO</div>
                  <h1 style="font-size:2.5rem; font-weight:800; letter-spacing:-0.03em;">${v.name}</h1>
                  <p style="color:var(--text-secondary); font-size:0.95rem;">${v.brand} ${v.year ? '• ' + v.year : ''} ${v.km ? '• ' + v.km : ''}</p>
                </div>
                <div>
                  <button id="addMaintBtn" class="btn-primary">+ Nova Manutenção</button>
                </div>
              </div>
            </div>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(120px, 1fr)); gap:1px; background:var(--border-subtle); padding-top:1px;">
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">MARCA</p><p style="font-weight:700; font-size:1rem;">${v.brand}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">ANO</p><p style="font-weight:700; font-size:1rem;">${v.year || '-'}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">MOTOR</p><p style="font-weight:700; font-size:1rem;">${v.engine || '-'}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">POTÊNCIA</p><p style="font-weight:700; font-size:1rem;">${v.power || '-'}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">CÂMBIO</p><p style="font-weight:700; font-size:1rem;">${v.transmission || '-'}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">KM</p><p style="font-weight:700; font-size:1rem;">${v.km || '-'}</p></div>
            </div>
          </div>

          <div class="glow-card" style="padding:32px;">
            <h3 style="font-size:1.3rem; font-weight:700; margin-bottom:24px;">Histórico do Veículo</h3>
            <div class="timeline">${maintList}</div>
          </div>
        `;

        $('addMaintBtn')?.addEventListener('click', () => {
          $('maintenanceVehicleId').value = v.id;
          $('maintenanceForm').reset();
          $('maintenanceFormModal').classList.add('active');
        });

        backToGeneratorBtn.onclick = () => {
          window.location.href = window.location.origin + window.location.pathname;
        };
      }

      // ----- INSERIR MANUTENÇÃO -----
      $('maintenanceForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const vehicleId = $('maintenanceVehicleId').value;
        const data = {
          vehicle_id: parseInt(vehicleId),
          date: $('mDate').value.trim(),
          description: $('mDesc').value.trim(),
          value: $('mValue').value.trim(),
          place: $('mPlace').value.trim(),
        };

        try {
          const { error } = await supabase.from('maintenances').insert([data]);
          if (error) throw error;
          triggerToast('Manutenção adicionada!');
          $('maintenanceFormModal').classList.remove('active');
          renderPublic();
        } catch (err) {
          triggerToast('Erro: ' + err.message, true);
        }
      });

      $('cancelMaintenanceBtn').addEventListener('click', () => {
        $('maintenanceFormModal').classList.remove('active');
      });

      // ----- INICIALIZAÇÃO -----
      function init() {
        $('generateQrBtn')?.addEventListener('click', generateAndShowQR);
        $('copyGeneratedLinkBtn')?.addEventListener('click', copyGeneratedLink);

        document.querySelectorAll('.modal-overlay').forEach(el => {
          el.addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
          });
        });

        const params = new URLSearchParams(window.location.search);
        if (params.has('id')) {
          renderPublic();
        } else {
          document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
          generatorView.classList.add('active');
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
