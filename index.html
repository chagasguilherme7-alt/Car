<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarPass | Prontuário Digital do Veículo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* ===== RESET E VARIÁVEIS ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --bg-dark: #050508;
      --bg-card: #0e0e13;
      --bg-surface: #16161f;
      --bg-surface-elevated: #20202d;
      --border-subtle: rgba(255,255,255,0.08);
      --border-medium: rgba(255,255,255,0.18);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-electric: #0066ff;
      --accent-cyan: #00d2ff;
      --accent-emerald: #10b981;
      --accent-amber: #f59e0b;
      --accent-rose: #f43f5e;
      --glass-bg: rgba(14, 14, 19, 0.75);
      --glass-border: rgba(255, 255, 255, 0.1);
      --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow-x: hidden;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--bg-surface-elevated); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-electric); }

    /* ===== UTILITÁRIOS ===== */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
    }
    .glow-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      overflow: hidden;
      transition: var(--transition);
    }
    .glow-card:hover {
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-electric), #0044b3);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 20px rgba(0,102,255,0.35);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,102,255,0.6);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      border: 1px solid var(--border-medium);
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-blue { background: rgba(0,102,255,0.15); color: var(--accent-cyan); border: 1px solid rgba(0,102,255,0.3); }
    .badge-green { background: rgba(16,185,129,0.15); color: var(--accent-emerald); border: 1px solid rgba(16,185,129,0.3); }
    .badge-amber { background: rgba(245,158,11,0.15); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.3); }

    /* ===== VIEWS ===== */
    .view-section { display: none; animation: fadeIn 0.4s ease forwards; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    .logo {
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.04em;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .logo-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-electric);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-electric);
    }

    /* ===== STATS DASHBOARD ===== */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-primary);
    }
    .stat-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ===== LINHA DO TEMPO (TIMELINE) ===== */
    .timeline {
      position: relative;
      padding-left: 32px;
      margin-top: 24px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border-subtle);
    }
    .timeline-node {
      position: relative;
      margin-bottom: 28px;
    }
    .timeline-node::before {
      content: '';
      position: absolute;
      left: -26px;
      top: 6px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-electric);
      box-shadow: 0 0 12px var(--accent-electric);
      border: 3px solid var(--bg-dark);
    }
    .timeline-card {
      padding: 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      transition: var(--transition);
    }
    .timeline-card:hover {
      border-color: rgba(255,255,255,0.15);
      background: var(--bg-surface-elevated);
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      border-radius: 20px;
      max-width: 520px;
      width: 100%;
      padding: 32px;
      position: relative;
      animation: modalUp 0.3s ease;
    }
    @keyframes modalUp {
      from { transform: translateY(30px) scale(0.95); opacity:0; }
      to { transform: translateY(0) scale(1); opacity:1; }
    }

    /* ===== FORMULÁRIOS & INPUTS ===== */
    input[type="text"], input[type="email"], input[type="password"], select, textarea {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      padding: 12px 16px;
      border-radius: 10px;
      color: #fff;
      outline: none;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-electric);
    }
    label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }

    /* ===== NOTIFICAÇÃO TOAST ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--bg-surface-elevated);
      border: 1px solid var(--accent-electric);
      color: #fff;
      padding: 14px 24px;
      border-radius: 12px;
      box-shadow: var(--shadow-premium);
      z-index: 3000;
      transform: translateY(100px);
      opacity: 0;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ===== QR CODE EXIBIÇÃO ===== */
    .qr-display {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      display: inline-block;
      min-width: 200px;
      min-height: 200px;
    }
    .qr-display img, .qr-display canvas {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div id="toast" class="toast">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d2ff" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span id="toast-message">Notificação</span>
  </div>

  <div id="maintenanceFormModal" class="modal-overlay">
    <div class="modal-content">
      <h3 style="font-size:1.4rem; font-weight:700; margin-bottom:16px;">Registrar Manutenção</h3>
      <form id="maintenanceForm">
        <input type="hidden" id="maintenanceVehicleId" value="" />
        
        <label>Tipo / Categoria *</label>
        <select id="mCategory" required>
          <option value="🛢️ Troca de Óleo & Filtro">🛢️ Troca de Óleo & Filtro</option>
          <option value="🛑 Sistema de Freios">🛑 Sistema de Freios</option>
          <option value="🛞 Pneus & Alinhamento">🛞 Pneus & Alinhamento</option>
          <option value="⚙️ Suspensão & Direção">⚙️ Suspensão & Direção</option>
          <option value="🔋 Bateria & Elétrica">🔋 Bateria & Elétrica</option>
          <option value="🔍 Revisão Geral">🔍 Revisão Geral</option>
          <option value="🛠️ Outros Serviços">🛠️ Outros Serviços</option>
        </select>

        <label>Descrição do Serviço *</label>
        <input type="text" id="mDesc" placeholder="Ex: Óleo Motul 5W30 + Filtro de Óleo" required />
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
          <div>
            <label>Data *</label>
            <input type="text" id="mDate" placeholder="Ex: 23 Jul, 2026" required />
          </div>
          <div>
            <label>Quilometragem (KM)</label>
            <input type="text" id="mKm" placeholder="Ex: 45.000" />
          </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
          <div>
            <label>Valor Investido</label>
            <input type="text" id="mValue" placeholder="Ex: R$ 650,00" />
          </div>
          <div>
            <label>Oficina / Local</label>
            <input type="text" id="mPlace" placeholder="Ex: Concessionária / Oficina X" />
          </div>
        </div>

        <div style="display:flex; gap:12px; margin-top:20px; justify-content:flex-end;">
          <button type="button" id="cancelMaintenanceBtn" class="btn-secondary">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar Registro</button>
        </div>
      </form>
    </div>
  </div>

  <div id="view-generator" class="view-section active">
    <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; background:radial-gradient(circle at 50% 30%, rgba(0,102,255,0.18) 0%, transparent 65%);">
      <div class="logo" style="margin-bottom:32px;"><div class="logo-dot"></div> CARPASS</div>
      <div class="glass-panel" style="max-width:500px; width:100%; padding:40px; text-align:center;">
        <h1 style="font-size:2.2rem; font-weight:800; margin-bottom:12px;">Gerar QR Code</h1>
        <p style="color:var(--text-secondary); margin-bottom:32px;">Crie um QR Code exclusivo para colar ou vincular ao seu veículo.</p>
        <button id="generateQrBtn" class="btn-primary" style="width:100%; justify-content:center; font-size:1.1rem; padding:16px;">
          📱 Gerar Novo QR Code
        </button>
        <div id="qrGeneratedContainer" style="margin-top:32px; display:none;">
          <div class="qr-display" id="qrDisplayBox"></div>
          <p style="color:var(--text-secondary); font-size:0.85rem; margin-top:12px;">Escaneie o código acima para iniciar o cadastro ou abrir o painel.</p>
          <button id="copyGeneratedLinkBtn" class="btn-secondary" style="margin-top:16px; width:100%; justify-content:center;">Copiar Link Direto</button>
        </div>
      </div>
    </div>
  </div>

  <div id="view-public" class="view-section">
    <div style="max-width:1100px; margin:0 auto; padding:40px 20px 80px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
        <div class="logo"><div class="logo-dot"></div> CARPASS <span style="font-size:0.75rem; color:var(--text-muted); font-weight:400; margin-left:8px;">| PRONTUÁRIO DIGITAL</span></div>
        <button id="backToGeneratorBtn" class="btn-secondary">Voltar ao Gerador</button>
      </div>
      <div id="publicContent">
        </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ----- CONFIGURAÇÃO SUPABASE -----
      const SUPABASE_URL = 'https://mdyzyfimlkmxyishmaao.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_XeZ2g0WeeP09BVbm6C4n7w_McAyCiCF';

      let supabase;
      if (window._supabaseClient) {
        supabase = window._supabaseClient;
      } else {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        window._supabaseClient = supabase;
      }

      // ----- DOM REFS -----
      const $ = id => document.getElementById(id);
      const generatorView = $('view-generator');
      const publicView = $('view-public');
      const publicContent = $('publicContent');
      const backToGeneratorBtn = $('backToGeneratorBtn');
      const toast = $('toast');
      const toastMsg = $('toast-message');

      // ----- TOAST -----
      function triggerToast(msg, isError = false) {
        toastMsg.innerText = msg;
        toast.style.borderColor = isError ? '#ff4444' : 'var(--accent-electric)';
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => {
          toast.classList.remove('show');
        }, 4000);
      }

      // ----- GERAR UUID -----
      function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      }

      // ----- GERAR QR CODE -----
      function generateAndShowQR() {
        const uuid = generateUUID();
        const targetUrl = window.location.origin + window.location.pathname + '?id=' + uuid;

        const container = $('qrGeneratedContainer');
        const qrDisplay = $('qrDisplayBox');
        qrDisplay.innerHTML = ''; 

        if (window.QRCode) {
          new QRCode(qrDisplay, {
            text: targetUrl,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
          });
        }

        qrDisplay.dataset.url = targetUrl;
        container.style.display = 'block';
        triggerToast('QR Code criado! Escaneie para vincular.');
      }

      // ----- COPIAR LINK -----
      function copyGeneratedLink() {
        const qrDisplay = $('qrDisplayBox');
        const url = qrDisplay?.dataset.url || window.location.href;
        navigator.clipboard?.writeText(url).then(() => {
          triggerToast('Link copiado!');
        }).catch(() => {
          prompt('Copie o link abaixo:', url);
        });
      }

      // ----- BUSCAR NO SUPABASE -----
      async function loadVehicleByUuid(uuid) {
        try {
          const { data, error } = await supabase
            .from('vehicles')
            .select('*, maintenances(*)')
            .eq('uuid', uuid)
            .maybeSingle();

          if (error) {
            console.error('Erro na busca:', error);
            return null;
          }
          return data;
        } catch (err) {
          return null;
        }
      }

      // ----- RENDERIZAR TELA DE VEÍCULO -----
      async function renderPublic() {
        const params = new URLSearchParams(window.location.search);
        const uuid = params.get('id');

        if (!uuid) {
          document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
          generatorView.classList.add('active');
          return;
        }

        publicContent.innerHTML = '<div style="text-align:center; padding:60px; color:var(--text-secondary);">Buscando histórico do veículo...</div>';
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        publicView.classList.add('active');

        const vehicleData = await loadVehicleByUuid(uuid);

        // -------------------------------------------------------------
        // CASO A: QR CODE NÃO CADASTRADO -> FORMULÁRIO DE CADASTRO
        // -------------------------------------------------------------
        if (!vehicleData) {
          publicContent.innerHTML = `
            <div class="glass-panel" style="max-width:520px; margin:0 auto; padding:40px;">
              <h2 style="font-size:1.6rem; font-weight:700; text-align:center; margin-bottom:8px;">Ativar Novo CarPass</h2>
              <p style="color:var(--text-secondary); text-align:center; margin-bottom:24px; font-size:0.9rem;">
                Este QR Code é novo. Cadastre seu veículo para gerar seu histórico digital.
              </p>
              <form id="publicVehicleForm">
                <label>E-mail do Proprietário *</label>
                <input type="email" id="publicAuthEmail" placeholder="seu@email.com" required />
                
                <label>Senha de Acesso *</label>
                <input type="password" id="publicAuthPassword" placeholder="••••••••" required />
                
                <hr style="border-color:var(--border-subtle); margin:20px 0;" />
                
                <label>Nome / Modelo *</label>
                <input type="text" id="publicVName" placeholder="Ex: Civic Touring 1.5 Turbo" required />
                
                <label>Marca *</label>
                <input type="text" id="publicVBrand" placeholder="Ex: Honda" required />
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                  <div>
                    <label>Ano</label>
                    <input type="text" id="publicVYear" placeholder="Ex: 2021" />
                  </div>
                  <div>
                    <label>Quilometragem Atual</label>
                    <input type="text" id="publicVKm" placeholder="Ex: 48.500 km" />
                  </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                  <div>
                    <label>Motor</label>
                    <input type="text" id="publicVEngine" placeholder="Ex: 1.5 Turbo" />
                  </div>
                  <div>
                    <label>Potência (CV)</label>
                    <input type="text" id="publicVPower" placeholder="Ex: 173 CV" />
                  </div>
                </div>
                
                <label>Câmbio</label>
                <input type="text" id="publicVTransmission" placeholder="Ex: CVT 7 Marchas" />
                
                <label>URL da Imagem do Veículo (opcional)</label>
                <input type="text" id="publicVImage" placeholder="https://exemplo.com/foto.jpg" />
                
                <button type="submit" id="publicSubmitBtn" class="btn-primary" style="width:100%; margin-top:20px; justify-content:center;">
                  Cadastrar e Vincular QR Code
                </button>
              </form>
            </div>
          `;

          const form = $('publicVehicleForm');
          const submitBtn = $('publicSubmitBtn');

          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Gravando...';

            const email = $('publicAuthEmail').value.trim();
            const password = $('publicAuthPassword').value.trim();

            try {
              let userId = null;
              const { data: signInData } = await supabase.auth.signInWithPassword({ email, password });
              if (signInData && signInData.user) {
                userId = signInData.user.id;
              } else {
                const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
                if (signUpError) throw new Error(signUpError.message);
                userId = signUpData.user?.id;
              }

              if (!userId) throw new Error('Erro na autenticação.');

              const { error: insertError } = await supabase
                .from('vehicles')
                .insert([{
                  uuid: uuid,
                  user_id: userId,
                  name: $('publicVName').value.trim(),
                  brand: $('publicVBrand').value.trim(),
                  year: $('publicVYear').value.trim(),
                  km: $('publicVKm').value.trim(),
                  power: $('publicVPower').value.trim(),
                  engine: $('publicVEngine').value.trim(),
                  transmission: $('publicVTransmission').value.trim(),
                  image: $('publicVImage').value.trim()
                }]);

              if (insertError) throw new Error(insertError.message);

              triggerToast('Veículo ativado com sucesso!');
              setTimeout(() => { window.location.reload(); }, 1200);

            } catch (err) {
              triggerToast('Erro: ' + err.message, true);
              submitBtn.disabled = false;
              submitBtn.textContent = 'Cadastrar e Vincular QR Code';
            }
          });

          backToGeneratorBtn.onclick = () => { window.location.href = window.location.origin + window.location.pathname; };
          return;
        }

        // -------------------------------------------------------------
        // CASO B: VEÍCULO CADASTRADO -> PAINEL PROFISSIONAL
        // -------------------------------------------------------------
        const v = vehicleData;
        const maints = v.maintenances || [];

        // Encontrar última troca de óleo
        const lastOleo = maints.slice().reverse().find(m => m.description?.toLowerCase().includes('óleo') || m.description?.toLowerCase().includes('oleo'));

        // Renderizar Lista da Timeline
        const maintListHTML = maints.map(m => `
          <div class="timeline-node">
            <div class="timeline-card">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px;">
                <div>
                  <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
                    <span class="badge badge-blue">${m.description.startsWith('🛢️') || m.description.startsWith('🛑') || m.description.startsWith('🛞') || m.description.startsWith('⚙️') || m.description.startsWith('🔋') || m.description.startsWith('🔍') ? m.description.split(' ')[0] + ' Serviço' : '🔧 Serviço'}</span>
                    <span style="color:var(--text-muted); font-size:0.8rem;">${m.date} ${m.place ? '• ' + m.place : ''}</span>
                  </div>
                  <h4 style="font-size:1.1rem; font-weight:700; margin-top:2px;">${m.description}</h4>
                  ${m.km ? `<p style="color:var(--text-secondary); font-size:0.85rem; margin-top:4px;">📍 Realizado em: <strong>${m.km} km</strong></p>` : ''}
                </div>
                ${m.value ? `<span class="badge badge-green" style="font-size:0.9rem;">${m.value}</span>` : ''}
              </div>
            </div>
          </div>
        `).join('') || '<p style="color:var(--text-muted); padding:20px 0;">Nenhuma manutenção registrada ainda. Clique em "Registrar Manutenção" para adicionar.</p>';

        publicContent.innerHTML = `
          <div class="glow-card" style="margin-bottom:32px; padding:0; overflow:hidden;">
            <div style="height:360px; width:100%; background-size:cover; background-position:center; background-image:url('${v.image || 'https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?auto=format&fit=crop&w=1600&q=80'}'); position:relative;">
              <div style="position:absolute; inset:0; background:linear-gradient(180deg, rgba(5,5,8,0.1) 0%, var(--bg-card) 100%);"></div>
              <div style="position:absolute; bottom:28px; left:28px; right:28px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px;">
                <div>
                  <div class="badge badge-green" style="margin-bottom:10px;">✓ HISTÓRICO VERIFICADO</div>
                  <h1 style="font-size:2.6rem; font-weight:800; letter-spacing:-0.03em; line-height:1.1;">${v.name}</h1>
                  <p style="color:var(--text-secondary); font-size:1rem; margin-top:6px;">${v.brand} ${v.year ? '• ' + v.year : ''} ${v.km ? '• ' + v.km : ''}</p>
                </div>
                <div>
                  <button id="addMaintBtn" class="btn-primary">+ Registrar Manutenção</button>
                </div>
              </div>
            </div>
            
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(110px, 1fr)); gap:1px; background:var(--border-subtle); padding-top:1px;">
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">MARCA</p><p style="font-weight:700; font-size:1rem;">${v.brand}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">ANO</p><p style="font-weight:700; font-size:1rem;">${v.year || '-'}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">KM ATUAL</p><p style="font-weight:700; font-size:1rem;">${v.km || '-'}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">MOTOR</p><p style="font-weight:700; font-size:1rem;">${v.engine || '-'}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">POTÊNCIA</p><p style="font-weight:700; font-size:1rem;">${v.power || '-'}</p></div>
              <div style="background:var(--bg-card); padding:16px; text-align:center;"><p style="color:var(--text-muted); font-size:0.7rem;">CÂMBIO</p><p style="font-weight:700; font-size:1rem;">${v.transmission || '-'}</p></div>
            </div>
          </div>

          <div class="dashboard-grid">
            <div class="stat-card">
              <div class="stat-header">
                <span>🛢️ TROCA DE ÓLEO</span>
                <span class="badge badge-blue">PREVENTIVA</span>
              </div>
              <div class="stat-value" style="font-size:1.2rem; margin:8px 0;">
                ${lastOleo ? lastOleo.date : 'Não registrada'}
              </div>
              <div class="stat-sub">
                ${lastOleo && lastOleo.km ? 'Feita com: ' + lastOleo.km + ' km' : 'Recomendado a cada 10.000 km ou 1 ano'}
              </div>
            </div>

            <div class="stat-card">
              <div class="stat-header">
                <span>📋 TOTAL REGISTROS</span>
                <span class="badge badge-green">HISTÓRICO</span>
              </div>
              <div class="stat-value">${maints.length}</div>
              <div class="stat-sub">Serviços e manutenções salvos</div>
            </div>

            <div class="stat-card">
              <div class="stat-header">
                <span>🛡️ STATUS DO VEÍCULO</span>
                <span class="badge badge-green">OK</span>
              </div>
              <div class="stat-value" style="font-size:1.2rem; color:var(--accent-emerald); margin:8px 0;">
                Em Dia
              </div>
              <div class="stat-sub">Prontuário sem alertas críticos</div>
            </div>
          </div>

          <div class="glow-card" style="padding:32px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
              <div>
                <h3 style="font-size:1.3rem; font-weight:700;">Linha do Tempo de Manutenções</h3>
                <p style="color:var(--text-secondary); font-size:0.85rem; margin-top:4px;">Histórico cronológico de serviços executados neste veículo.</p>
              </div>
            </div>
            <div class="timeline">${maintListHTML}</div>
          </div>
        `;

        // ABRIR MODAL DE REGISTRO DE MANUTENÇÃO
        $('addMaintBtn')?.addEventListener('click', () => {
          $('maintenanceVehicleId').value = v.id;
          $('maintenanceForm').reset();
          $('maintenanceFormModal').classList.add('active');
        });

        backToGeneratorBtn.onclick = () => { window.location.href = window.location.origin + window.location.pathname; };
      }

      // ----- SUBMETER NOVA MANUTENÇÃO -----
      $('maintenanceForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const vehicleId = $('maintenanceVehicleId').value;
        const category = $('mCategory').value;
        const descText = $('mDesc').value.trim();
        const kmValue = $('mKm').value.trim();

        const fullDescription = `${category.split(' ')[0]} ${descText}`;

        const data = {
          vehicle_id: parseInt(vehicleId),
          date: $('mDate').value.trim(),
          description: fullDescription,
          value: $('mValue').value.trim(),
          place: $('mPlace').value.trim(),
          km: kmValue
        };

        try {
          const { error } = await supabase.from('maintenances').insert([data]);
          if (error) throw error;

          // Atualizar KM do veículo se informado
          if (kmValue) {
            await supabase.from('vehicles').update({ km: kmValue + ' km' }).eq('id', vehicleId);
          }

          triggerToast('Manutenção registrada com sucesso!');
          $('maintenanceFormModal').classList.remove('active');
          renderPublic();
        } catch (err) {
          triggerToast('Erro: ' + err.message, true);
        }
      });

      $('cancelMaintenanceBtn').addEventListener('click', () => {
        $('maintenanceFormModal').classList.remove('active');
      });

      // ----- INICIALIZAÇÃO -----
      function init() {
        $('generateQrBtn')?.addEventListener('click', generateAndShowQR);
        $('copyGeneratedLinkBtn')?.addEventListener('click', copyGeneratedLink);

        document.querySelectorAll('.modal-overlay').forEach(el => {
          el.addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
          });
        });

        const params = new URLSearchParams(window.location.search);
        if (params.has('id')) {
          renderPublic();
        } else {
          document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
          generatorView.classList.add('active');
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
